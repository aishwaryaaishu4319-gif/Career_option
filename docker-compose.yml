version: "3.9"

services:

  frontend:
    build: ./Frontend
    container_name: career_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./Frontend:/app
    stdin_open: true
    tty: true

  backend:
    build: ./backend
    container_name: career_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app